services:
  mysql:
    image: mysql:latest
    container_name: c_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: "api"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: c_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: c_mysql
    networks:
      - db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: c_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: c_mysql
      DB_PORT: 3306
      DB_DATABASE: api
      DB_USERNAME: root
      DB_PASSWORD: "1234"
    depends_on:
      - mysql
    networks:
      - db

volumes:
  mysql_data:

networks:
  db:
